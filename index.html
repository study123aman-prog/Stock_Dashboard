<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockScope — Market Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161d;
      --border:    #1f2330;
      --accent:    #c8f04c;
      --accent2:   #4cf0c0;
      --red:       #f04c6a;
      --text:      #e8eaf0;
      --muted:     #5a5f72;
      --card:      #181b24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
    }

    #sidebar .logo {
      font-family: 'Fraunces', serif;
      font-size: 1.35rem;
      color: var(--accent);
      padding: 0 24px 28px;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.5px;
    }

    #sidebar .logo span { color: var(--muted); font-size: 0.7rem; display: block; margin-top: 2px; font-family: 'DM Mono', monospace; }

    #sidebar h4 {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--muted);
      padding: 20px 24px 10px;
      text-transform: uppercase;
    }

    .stock-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.18s;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .stock-btn:hover { background: var(--card); color: var(--text); }
    .stock-btn.active { border-left-color: var(--accent); color: var(--accent); background: rgba(200,240,76,0.05); }

    .stock-btn .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.18s;
    }
    .stock-btn.active .dot { background: var(--accent); }

    .stock-btn .name { flex: 1; }
    .stock-btn .badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--border);
    }
    .stock-btn.up .badge   { background: rgba(76,240,192,0.15); color: var(--accent2); }
    .stock-btn.down .badge { background: rgba(240,76,106,0.15); color: var(--red); }

    /* ── MAIN ── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* scrollbar */
    #main::-webkit-scrollbar { width: 4px; }
    #main::-webkit-scrollbar-track { background: transparent; }
    #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── TOPBAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    #topbar h1 {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -1px;
    }

    #topbar h1 em { font-style: italic; color: var(--accent); }

    .controls { display: flex; gap: 8px; align-items: center; }

    select, button {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.18s;
      outline: none;
    }

    select:hover, button:hover { border-color: var(--accent); }

    button.primary {
      background: var(--accent);
      color: #0d0f14;
      font-weight: 500;
      border-color: var(--accent);
    }
    button.primary:hover { background: #b8e040; }

    /* ── STAT CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0.5;
    }

    .card.red-top::after { background: var(--red); }
    .card.teal-top::after { background: var(--accent2); }

    .card label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }

    .card .val {
      font-size: 1.4rem;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .card .val.up   { color: var(--accent2); }
    .card .val.down { color: var(--red); }
    .card .val.neu  { color: var(--accent); }

    /* ── CHART BOX ── */
    .chart-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .chart-box .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .chart-box .chart-header h3 {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 300;
    }

    .chart-box .chart-header .tag {
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(200,240,76,0.1);
      color: var(--accent);
      border: 1px solid rgba(200,240,76,0.2);
    }

    canvas { max-height: 280px; }

    /* ── BOTTOM ROW ── */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 700px) { .bottom-row { grid-template-columns: 1fr; } }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
    }

    .panel h3 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 1rem;
      margin-bottom: 16px;
      color: var(--muted);
    }

    .panel h3 span { color: var(--text); }

    /* movers list */
    .mover-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .mover-item:last-child { border-bottom: none; }
    .mover-item .sym { color: var(--text); }
    .mover-item .chg { font-weight: 500; }
    .mover-item .chg.up   { color: var(--accent2); }
    .mover-item .chg.down { color: var(--red); }

    /* correlation panel */
    .corr-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .corr-row select { flex: 1; min-width: 100px; }

    #corr-result {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 12px;
      min-height: 24px;
    }

    .corr-bar-wrap {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 10px;
      overflow: hidden;
    }

    .corr-bar {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      width: 0%;
      transition: width 0.5s ease;
    }

    /* loader */
    #loader {
      display: none;
      font-size: 0.75rem;
      color: var(--muted);
      animation: pulse 1s infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

    /* empty state */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 24px 0;
    }
  </style>
</head>

<body>

<!-- ── SIDEBAR ── -->
<nav id="sidebar">
  <div class="logo">StockScope <span>MARKET DASHBOARD</span></div>
  <h4>Indices</h4>
  <div id="stock-list"></div>
</nav>

<!-- ── MAIN ── -->
<main id="main">

  <!-- Top Bar -->
  <div id="topbar">
    <h1 id="title">Select a <em>stock</em></h1>
    <div class="controls">
      <select id="days">
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="180">Last 180 days</option>
      </select>
      <button class="primary" onclick="loadData()">Load →</button>
      <span id="loader">● Fetching…</span>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="cards">
    <div class="card">
      <label>52W High</label>
      <div class="val up" id="c-high">—</div>
    </div>
    <div class="card red-top">
      <label>52W Low</label>
      <div class="val down" id="c-low">—</div>
    </div>
    <div class="card teal-top">
      <label>Avg Close</label>
      <div class="val neu" id="c-avg">—</div>
    </div>
    <div class="card">
      <label>Volatility</label>
      <div class="val" id="c-vol">—</div>
    </div>
    <div class="card">
      <label>Sentiment</label>
      <div class="val" id="c-sent">—</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-box">
    <div class="chart-header">
      <h3>Closing Price <span style="color:var(--muted)">/ 7-Day MA</span></h3>
      <div class="tag" id="chart-tag">No data</div>
    </div>
    <canvas id="chart"></canvas>
  </div>

  <!-- Bottom Row -->
  <div class="bottom-row">

    <!-- Top Movers -->
    <div class="panel">
      <h3><span>Top Movers</span> — selected period</h3>
      <div id="movers"><div class="empty">Load a stock first</div></div>
    </div>

    <!-- Correlation -->
    <div class="panel">
      <h3><span>Correlation</span> — between two stocks</h3>
      <div class="corr-row">
        <select id="stock1">
          <option value="TCS.NS">TCS</option>
          <option value="INFY.NS">INFY</option>
          <option value="HDFCBANK.NS">HDFCBANK</option>
          <option value="LT.NS">LT</option>
          <option value="WIPRO.NS">WIPRO</option>
        </select>
        <span style="color:var(--muted);font-size:0.75rem">vs</span>
        <select id="stock2">
          <option value="INFY.NS">INFY</option>
          <option value="TCS.NS">TCS</option>
          <option value="HDFCBANK.NS">HDFCBANK</option>
          <option value="LT.NS">LT</option>
          <option value="WIPRO.NS">WIPRO</option>
        </select>
        <button onclick="getCorrelation()">Check</button>
      </div>
      <div id="corr-result">Pick two stocks and click Check.</div>
      <div class="corr-bar-wrap"><div class="corr-bar" id="corr-bar"></div></div>
    </div>

  </div>
</main>

<script>
  /* ── CONFIG ── */
  const API = "http://127.0.0.1:8000";

  const STOCKS = [
    { sym: "TCS.NS",      label: "TCS" },
    { sym: "INFY.NS",     label: "INFY" },
    { sym: "HDFCBANK.NS", label: "HDFCBANK" },
    { sym: "LT.NS",       label: "LT" },
    { sym: "WIPRO.NS",    label: "WIPRO" },
  ];

  let currentStock = null;
  let chartInstance = null;
  let lastData = [];

  /* ── BUILD SIDEBAR ── */
  const list = document.getElementById("stock-list");
  STOCKS.forEach(s => {
    const el = document.createElement("div");
    el.className = "stock-btn";
    el.dataset.sym = s.sym;
    el.innerHTML = `<div class="dot"></div><div class="name">${s.label}</div><div class="badge">—</div>`;
    el.onclick = () => selectStock(s.sym, s.label, el);
    list.appendChild(el);
  });

  function selectStock(sym, label, el) {
    document.querySelectorAll(".stock-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
    currentStock = sym;
    document.getElementById("title").innerHTML = `<em>${label}</em> Overview`;
  }

  /* ── LOAD DATA ── */
  async function loadData() {
    if (!currentStock) { alert("Please select a stock first."); return; }

    setLoading(true);
    try {
      const days = parseInt(document.getElementById("days").value);

      const [dataRes, summRes] = await Promise.all([
        fetch(`${API}/data/${currentStock}`),
        fetch(`${API}/summary/${currentStock}`)
      ]);

      let data = await dataRes.json();
      const summary = await summRes.json();

      /* filter */
      data = data.slice(-days);
      lastData = data;

      /* cards */
      set("c-high", summary["52W High"]  ?? "—");
      set("c-low",  summary["52W Low"]   ?? "—");
      set("c-avg",  summary["Average Close"] ?? "—");
      set("c-vol",  summary["Latest Volatility"] ?? "—");

      const sent = summary["Latest Sentiment"];
      const sentEl = document.getElementById("c-sent");
      sentEl.textContent = sent ?? "—";
      sentEl.className = "val " + (sent > 0 ? "up" : sent < 0 ? "down" : "neu");

      /* chart tag */
      document.getElementById("chart-tag").textContent =
        `${data.length} days · ${currentStock}`;

      /* draw chart */
      drawChart(data);

      /* movers */
      drawMovers(data);

    } catch (e) {
      alert("Could not fetch data. Is your backend running?\nRun: uvicorn main:app --reload");
    } finally {
      setLoading(false);
    }
  }

  /* ── CHART ── */
  function drawChart(data) {
    const labels = data.map(d => d.Date?.slice(0,10) ?? d.Date);
    const prices = data.map(d => d.Close);
    const ma7    = data.map(d => d.MA7);

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "Close",
            data: prices,
            borderColor: "#c8f04c",
            backgroundColor: "rgba(200,240,76,0.07)",
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.3,
            fill: true,
          },
          {
            label: "MA 7",
            data: ma7,
            borderColor: "#4cf0c0",
            borderWidth: 1.5,
            borderDash: [4,4],
            pointRadius: 0,
            tension: 0.3,
          }
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: {
            labels: { color: "#5a5f72", font: { family: "DM Mono", size: 11 } }
          },
          tooltip: {
            backgroundColor: "#13161d",
            borderColor: "#1f2330",
            borderWidth: 1,
            titleColor: "#c8f04c",
            bodyColor: "#e8eaf0",
            bodyFont: { family: "DM Mono" },
          }
        },
        scales: {
          x: {
            ticks: { color: "#5a5f72", font: { family: "DM Mono", size: 10 }, maxTicksLimit: 8 },
            grid: { color: "#1f2330" }
          },
          y: {
            ticks: { color: "#5a5f72", font: { family: "DM Mono", size: 10 } },
            grid: { color: "#1f2330" }
          }
        }
      }
    });
  }

  /* ── MOVERS ── */
  function drawMovers(data) {
    if (data.length < 2) return;

    /* build per-stock changes — for now show daily return stats */
    const gainDay  = data.reduce((a, b) => (b["Daily Return"] > a["Daily Return"] ? b : a), data[0]);
    const lossDay  = data.reduce((a, b) => (b["Daily Return"] < a["Daily Return"] ? b : a), data[0]);
    const totalChg = data[data.length-1].Close - data[0].Close;

    const isUp = totalChg >= 0;

    /* update sidebar badge */
    const btn = document.querySelector(`.stock-btn[data-sym="${currentStock}"]`);
    if (btn) {
      btn.classList.toggle("up",   isUp);
      btn.classList.toggle("down", !isUp);
      btn.querySelector(".badge").textContent =
        (isUp ? "+" : "") + totalChg.toFixed(1);
    }

    document.getElementById("movers").innerHTML = `
      <div class="mover-item">
        <span class="sym">Best day</span>
        <span class="chg up">+${(gainDay["Daily Return"]*100).toFixed(2)}% on ${gainDay.Date?.slice(0,10)}</span>
      </div>
      <div class="mover-item">
        <span class="sym">Worst day</span>
        <span class="chg down">${(lossDay["Daily Return"]*100).toFixed(2)}% on ${lossDay.Date?.slice(0,10)}</span>
      </div>
      <div class="mover-item">
        <span class="sym">Period change</span>
        <span class="chg ${isUp?'up':'down'}">${isUp?'+':''}${totalChg.toFixed(2)} ₹</span>
      </div>
    `;
  }

  /* ── CORRELATION ── */
  async function getCorrelation() {
    const s1 = document.getElementById("stock1").value;
    const s2 = document.getElementById("stock2").value;

    if (s1 === s2) {
      document.getElementById("corr-result").textContent = "Pick two different stocks!";
      return;
    }

    try {
      const res  = await fetch(`${API}/correlation?symbol1=${s1}&symbol2=${s2}`);
      const data = await res.json();
      const c    = data.correlation;

      let desc = c > 0.8  ? "Very strongly correlated — they move almost together."
               : c > 0.5  ? "Moderately correlated — similar trends."
               : c > 0    ? "Weakly correlated — slight similarity."
               : c > -0.5 ? "Weakly inverse — slight opposite movement."
               :             "Strongly inverse — they move in opposite directions.";

      document.getElementById("corr-result").innerHTML =
        `<b style="color:var(--accent)">${c?.toFixed(4) ?? "N/A"}</b> &nbsp;—&nbsp; ${desc}`;

      /* bar: map -1..1 → 0%..100% */
      document.getElementById("corr-bar").style.width =
        ((c + 1) / 2 * 100).toFixed(1) + "%";

    } catch(e) {
      document.getElementById("corr-result").textContent = "Error fetching correlation.";
    }
  }

  /* ── HELPERS ── */
  function set(id, val) {
    document.getElementById(id).textContent = typeof val === "number" ? val.toFixed(2) : val;
  }

  function setLoading(on) {
    document.getElementById("loader").style.display = on ? "inline" : "none";
  }
</script>
</body>
</html>
